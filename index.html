<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0B1D3A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="TIAM Attendance - Church event attendance tracking">
  <title>TIAM Attendance</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles-compiled.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    /* iOS Safari fixes */
    body {
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* Prevent zoom on input focus */
    input, select, textarea {
      font-size: 16px !important;
    }
    /* Hide html5-qrcode UI */
    #qr-reader__dashboard_section_csr {
      display: none !important;
    }
    #qr-reader {
      border: none !important;
    }
    #qr-reader video {
      border-radius: 12px;
    }
    #qr-reader__scan_region {
      border-radius: 12px !important;
    }
  </style>
</head>
<body class="bg-warm-bg">
  <div id="app"></div>
  <script type="module" src="app-tailwind.js"></script>
</body>
</html>
